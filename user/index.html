<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Color Bio Builder - User</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#7c3aed">

  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <div class="card">

      <!-- 🔑 My Token বাটন (সবার উপরে) -->
      <a href="https://ticket.kiosgamer.co.id" target="_blank" class="tokenBtn">
        🔑 My Token
      </a>

      <h2>Color Bio Builder (User)</h2>

      <input type="text" id="token" placeholder="Enter Token / Address (Identifier)">

      <div class="toolbar">
        <button id="bold" type="button"><b>B</b></button>
        <button id="italic" type="button"><i>I</i></button>
        <button id="underline" type="button"><u>U</u></button>

        <select id="borderStyle" title="Preview border style">
          <option value="soft">Border: soft</option>
          <option value="neon">Border: neon</option>
          <option value="none">Border: none</option>
        </select>

        <input type="color" id="picker" value="#ff0000" title="Custom color">
      </div>

      <div class="library">
        <button class="colorBtn" data-code="[c/FF0000]" style="background:#FF0000"></button>
        <button class="colorBtn" data-code="[c/00FF00]" style="background:#00FF00"></button>
        <button class="colorBtn" data-code="[c/0000FF]" style="background:#0000FF"></button>
        <button class="colorBtn" data-code="[c/FFFF00]" style="background:#FFFF00"></button>
        <button class="colorBtn" data-code="[c/FF00FF]" style="background:#FF00FF"></button>
        <button class="colorBtn" data-code="[c/00FFFF]" style="background:#00FFFF"></button>
        <button class="colorBtn" data-code="[c/FFFFFF]" style="background:#FFFFFF;border:1px solid #666;"></button>
        <button class="colorBtn" data-code="[c/FFA500]" style="background:#FFA500"></button>
        <button class="colorBtn" data-code="[c/800080]" style="background:#800080"></button>
        <button class="colorBtn" data-code="[c/00C853]" style="background:#00C853"></button>
      </div>

      <textarea id="editor" spellcheck="false" maxlength="280"
        placeholder="Write here... Example: [c/FFFFFF][b]YOUR NAME[/b]"></textarea>

      <div class="metaRow">
        <span id="count">0/280</span>
        <button id="clear" type="button" class="linkBtn">Clear</button>
      </div>

      <div class="preview">
        <h3>Live Preview</h3>
        <div id="previewBox" class="previewBox border-soft"></div>
      </div>

      <button id="submit" type="button">Submit</button>

      <p class="hint">
      </p>

      <!-- 📺 YouTube + 🎵 TikTok (একদম নিচে) -->
      <div class="socialRow">
        <a href="https://www.youtube.com/@gamingrnajaira6833" target="_blank" class="socialBtn youtube" title="YouTube">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="26" height="26">
            <path fill="#FF0000" d="M23.5 6.2s-.2-1.6-.9-2.3c-.9-.9-1.9-.9-2.4-1C16.8 2.5 12 2.5 12 2.5s-4.8 0-8.2.4c-.5.1-1.5.1-2.4 1-.7.7-.9 2.3-.9 2.3S0 8.1 0 10v1.9c0 1.9.3 3.8.3 3.8s.2 1.6.9 2.3c.9.9 2.1.9 2.6 1 1.9.2 8.2.3 8.2.3s4.8 0 8.2-.4c.5-.1 1.5-.1 2.4-1 .7-.7.9-2.3.9-2.3s.3-1.9.3-3.8V10c0-1.9-.3-3.8-.3-3.8zM9.5 14.8V7.5l6.5 3.7-6.5 3.6z"/>
          </svg>
        </a>

        <a href="https://www.tiktok.com/@riju.editz" target="_blank" class="socialBtn tiktok" title="TikTok">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
            <path fill="#ffffff" d="M19.6 6.3c-1.4-.3-2.6-1.1-3.4-2.3-.4-.6-.7-1.3-.8-2H12v13.4c0 1.5-1.2 2.7-2.7 2.7-1.5 0-2.7-1.2-2.7-2.7 0-1.5 1.2-2.7 2.7-2.7.3 0 .6.1.9.2v-3.5c-.3 0-.6-.1-.9-.1-3.4 0-6.2 2.8-6.2 6.2S5.9 21.8 9.3 21.8s6.2-2.8 6.2-6.2V9.1c1.3.9 2.9 1.5 4.6 1.5V7.1c-.2 0-.4-.1-.5-.1z"/>
          </svg>
        </a>
      </div>

    </div>
  </div>

  <script src="script.js"></script>

  <!-- PWA Service Worker -->
  <script>
    if ("serviceWorker" in navigator){
      window.addEventListener("load", function(){
        navigator.serviceWorker.register("sw.js")
          .then(function(reg){ console.log("SW registered:", reg); })
          .catch(function(err){ console.log("SW failed:", err); });
      });
    }
  </script>
</body>
</html>
